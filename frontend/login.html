<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | DSPM</title>
    <link rel="stylesheet" href="/static/styles.css?v=9" />
  </head>
  <body class="login-page">
    <section class="login-screen standalone">
      <div class="login-visual">
        <div class="logo-lockup large">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="img">
              <path d="M8 13c0-3 2-5 5-5h15c8 0 14 6 14 16s-6 16-14 16H13c-3 0-5-2-5-5V13Z" />
              <path d="M19 16h8c4 0 7 3 7 8s-3 8-7 8h-8V16Z" />
              <path d="M19 16v16" />
            </svg>
          </span>
          <div>
            <h1>DSPM</h1>
            <p>Data security posture command center</p>
          </div>
        </div>
        <div class="login-graphic" aria-hidden="true">
          <div class="graphic-node n1"></div>
          <div class="graphic-node n2"></div>
          <div class="graphic-node n3"></div>
          <div class="graphic-node n4"></div>
          <div class="graphic-line l1"></div>
          <div class="graphic-line l2"></div>
          <div class="graphic-line l3"></div>
          <div class="graphic-core">DSPM</div>
        </div>
      </div>

      <form id="login-form" class="login-card">
        <p class="eyebrow">Secure access</p>
        <h2>Sign in to continue</h2>
        <p>Scans, reports, history, tenant controls, and security operations require authentication.</p>
        <label>
          Username
          <input id="login-username" name="username" autocomplete="username" placeholder="admin" required />
        </label>
        <label>
          Password
          <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="admin123" required />
        </label>
        <button type="submit">Sign in</button>
        <span id="login-status" class="save-status">Local default: admin / admin123.</span>
        <div class="login-divider"></div>
        <a class="auth-link" href="/register">Don't have an account? Create account</a>
      </form>
    </section>
    <script src="/static/login.js?v=3"></script>
  </body>
</html>
